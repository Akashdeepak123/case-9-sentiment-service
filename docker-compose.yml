services:
  sentiment-api:
    build: .
    container_name: sentiment-api
    ports:
      - "8000:8000"
    environment:
      - TOKENIZERS_PARALLELISM=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  tests:
    build: .
    container_name: sentiment-tests
    environment:
      - TOKENIZERS_PARALLELISM=false
    command: python -m pytest -v
    profiles: ["test"]
